<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
    </linearGradient>
    <!-- Тень -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>
  
  <!-- Иконка с тенью -->
  <g filter="url(#shadow)">
    <!-- Человек -->
    <circle cx="23" cy="20" r="6.5" fill="url(#iconGrad)"/>
    <path d="M 14 29 Q 14 27 16 27 L 30 27 Q 32 27 32 29 L 32 40 Q 32 42 30 42 L 16 42 Q 14 42 14 40 Z" fill="url(#iconGrad)"/>
    
    <!-- Документ -->
    <rect x="35" y="15" width="20" height="26" rx="2.5" fill="url(#iconGrad)" opacity="0.97"/>
    
    <!-- Линии документа -->
    <line x1="39" y1="21" x2="51" y2="21" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <line x1="39" y1="25" x2="51" y2="25" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <line x1="39" y1="29" x2="47" y2="29" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Галочка -->
    <path d="M 39 34 L 41.5 36.5 L 46 32" stroke="#10B981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
