name: hrms-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: hrms-postgres-prod
    environment:
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrms_pass_prod}
      POSTGRES_DB: hrms_prod
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: hrms-onlyoffice-prod
    ports:
      - "8087:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-prod-secret-change-before-real-production}
      JWT_HEADER: "Authorization"
      JWT_IN_BODY: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: ../backend
    container_name: hrms-backend-prod
    volumes:
      - ../data/orders:/app/data/orders
      - ../data/templates:/app/data/templates
      - ../data/personal_files:/app/data/personal
      - ../logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8002:8000"
    env_file:
      - ../.env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://hrms_user:${POSTGRES_PASSWORD:-hrms_pass_prod}@postgres:5432/hrms_prod
      ENV: prod
      SECRET_KEY: ${SECRET_KEY:-hrms-prod-local-secret-change-before-real-production}
      ONLYOFFICE_ENABLED: "true"
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-prod-secret-change-before-real-production}
      ONLYOFFICE_PUBLIC_URL: ${LAN_PUBLIC_URL:-${ONLYOFFICE_PUBLIC_URL:-http://localhost:5175}}
      ONLYOFFICE_INTERNAL_URL: http://onlyoffice:80
      APP_PUBLIC_URL: ${LAN_PUBLIC_URL:-${APP_PUBLIC_URL:-http://localhost:5175}}
    depends_on:
      postgres:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
    command: >
      sh -c "until python -c 'import socket; s=socket.create_connection((\"postgres\", 5432), 3); s.close()'; do sleep 2; done &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: always

  frontend:
    build: ../frontend
    container_name: hrms-frontend-prod
    ports:
      - "5175:80"
    depends_on:
      - backend
      - onlyoffice
    restart: always

