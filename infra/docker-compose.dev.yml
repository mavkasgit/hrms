name: hrms-dev

services:
  postgres:
    image: postgres:15-alpine
    container_name: hrms-postgres
    environment:
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: hrms_pass
      POSTGRES_DB: hrms_dev
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms_user -d hrms_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: hrms-onlyoffice
    ports:
      - "8085:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: "onlyoffice-dev-secret-change-me"
      JWT_HEADER: "Authorization"
      JWT_IN_BODY: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
