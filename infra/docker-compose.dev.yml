name: hrms-dev

services:
  postgres:
    image: postgres:15-alpine
    container_name: hrms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrms_pass}
      POSTGRES_DB: ${POSTGRES_DB:-hrms_dev}
    ports:
      - "${DEV_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${DEV_POSTGRES_DATA_PATH:-../data/postgres-dev}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: hrms-onlyoffice
    ports:
      - "${DEV_ONLYOFFICE_PORT:-8085}:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-dev-secret-change-me}
      JWT_HEADER: "Authorization"
      JWT_IN_BODY: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
