map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_cf_visitor $cf_visitor_proto {
    default "";
    ~*\"scheme\":\"https\" https;
    ~*\"scheme\":\"http\" http;
}

map $http_x_forwarded_proto $xfp_proto {
    default "";
    ~*^https https;
    ~*^http http;
}

map $http_host $host_proto_override {
    default "";
    ~*\.trycloudflare\.com(?::\d+)?$ https;
    ~*\.loca\.lt(?::\d+)?$ https;
    ~*\.localtunnel\.me(?::\d+)?$ https;
}

map "$host_proto_override:$cf_visitor_proto:$xfp_proto" $origin_proto {
    default $scheme;
    ~^https: https;
    ~^http: http;
    ~^:https: https;
    ~^:http: http;
    ~^::https https;
    ~^::http http;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 2g;
    client_body_timeout 300s;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Backend API ---
    location ^~ /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # --- OnlyOffice ---
    location ^~ /onlyoffice/ {
        proxy_pass http://onlyoffice:80/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host/onlyoffice;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # OnlyOffice runtime absolute URLs (Editor.bin and others)
    location ^~ /cache/ {
        proxy_pass http://onlyoffice:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host/onlyoffice;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # OnlyOffice absolute paths (generated by Document Server internally)
    location ~ ^/(web-apps|sdkjs|doc|cache|coauthoring|spellchecker|converter|healthcheck)(/.*)?$ {
        proxy_pass http://onlyoffice:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # OnlyOffice versioned paths (e.g. 9.3.1-...)
    location ~ ^/[0-9]+\.[0-9]+\.[^/]+/ {
        proxy_pass http://onlyoffice:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # --- Frontend SPA ---
    location / {
        set $frontend_upstream http://frontend:8000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
    }
}
