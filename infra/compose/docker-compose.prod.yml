name: hrms-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: hrms-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrms_pass_prod}
      POSTGRES_DB: ${POSTGRES_DB:-hrms_prod}
    expose:
      - "5432"
    volumes:
      - ${PROD_POSTGRES_DATA_PATH:-../../data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: hrms-onlyoffice-prod
    expose:
      - "80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-prod-secret-change-before-real-production}
      JWT_HEADER: "Authorization"
      JWT_IN_BODY: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    image: ghcr.io/mavkasgit/hrms-backend:latest
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: hrms-backend-prod
    expose:
      - "8000"
    volumes:
      - ../../data/orders:/app/data/orders
      - ../../data/staffing:/app/data/staffing
      - ../../data/templates:/app/data/templates
      - ../../data/personal_files:/app/data/personal
      - ../../data/backups:/app/data/backups
      - ../../logs:/app/logs
    env_file:
      - ../../.env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hrms_user}:${POSTGRES_PASSWORD:-hrms_pass_prod}@postgres:5432/${POSTGRES_DB:-hrms_prod}
      ENV: prod
      SECRET_KEY: ${SECRET_KEY:-hrms-prod-local-secret-change-before-real-production}
      ONLYOFFICE_ENABLED: "true"
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-prod-secret-change-before-real-production}
      # ONLYOFFICE_PUBLIC_URL: empty (will fall back to dynamic request host)
      ONLYOFFICE_INTERNAL_URL: ${ONLYOFFICE_INTERNAL_URL:-http://nginx/onlyoffice}
      BACKEND_INTERNAL_CALLBACK_URL: ${BACKEND_INTERNAL_CALLBACK_URL:-http://backend:8000}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://backend:8000}
      HTTP_PROXY: ""
      http_proxy: ""
      HTTPS_PROXY: ""
      https_proxy: ""
      NO_PROXY: "*"
      no_proxy: "*"
    depends_on:
      postgres:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
    command: >
      sh -c "until python -c 'import socket; s=socket.create_connection((\"postgres\", 5432), 3); s.close()'; do sleep 2; done &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: always

  frontend:
    image: ghcr.io/mavkasgit/hrms-frontend:latest
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend-prod
    expose:
      - "80"
    depends_on:
      - backend
      - onlyoffice
    restart: always

  nginx:
    image: nginx:alpine
    container_name: hrms-nginx-prod
    ports:
      - "8081:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - default
      - shared_gateway
    depends_on:
      - frontend
      - backend
      - onlyoffice
    restart: always

  localtunnel:
    profiles: ["tunnel"]
    image: node:20-alpine
    container_name: hrms-localtunnel-prod
    network_mode: "service:nginx"
    depends_on:
      - nginx
    command: >
      sh -c "echo 'Waiting for nginx...' &&
             until wget -q -O /dev/null http://127.0.0.1:80; do sleep 2; done &&
             echo 'Starting localtunnel...' &&
             npx --yes localtunnel --port 80 --subdomain ${LOCALTUNNEL_SUBDOMAIN:-hrms-prod-7q2k9m4x} 2>&1"
    restart: unless-stopped

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: hrms-cloudflared-prod
    network_mode: "service:nginx"
    depends_on:
      - nginx
    command: >
      tunnel --url http://127.0.0.1:80 --protocol http2 --no-autoupdate
    restart: unless-stopped

networks:
  shared_gateway:
    external: true
