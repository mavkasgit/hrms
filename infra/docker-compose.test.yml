name: hrms-test

services:
  postgres:
    image: postgres:15-alpine
    container_name: hrms-postgres-test
    env_file:
      - ../.env.test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrms_pass_test}
      POSTGRES_DB: ${POSTGRES_DB:-hrms_test}
    ports:
      - "${TEST_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: hrms-onlyoffice-test
    ports:
      - "${TEST_ONLYOFFICE_PORT:-8086}:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-test-secret}
      JWT_HEADER: "Authorization"
      JWT_IN_BODY: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: hrms-backend-test
    volumes:
      - ../backend:/app
      - ../.env.test:/app/.env.test
      - orders_test_data:/app/data/orders
      - staffing_test_data:/app/data/staffing
      - templates_test_data:/app/data/templates
      - personal_files_test_data:/app/data/personal
    ports:
      - "${TEST_BACKEND_PORT:-8001}:8000"
    env_file:
      - ../.env.test
    environment:
      ENV_FILE: .env.test
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hrms_user}:${POSTGRES_PASSWORD:-hrms_pass_test}@postgres:5432/${POSTGRES_DB:-hrms_test}
      ENV: ${ENV:-test}
      ONLYOFFICE_ENABLED: ${ONLYOFFICE_ENABLED:-true}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-test-secret}
      ONLYOFFICE_PUBLIC_URL: http://host.docker.internal:5174
      ONLYOFFICE_INTERNAL_URL: http://onlyoffice:80
      APP_PUBLIC_URL: http://localhost:5174
    depends_on:
      postgres:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
    command: >
      sh -c "pip install -r requirements.txt && 
             until python -c 'import socket; s=socket.create_connection((\"postgres\", 5432), 3); s.close()'; do sleep 2; done &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend-test
    ports:
      - "${TEST_FRONTEND_PORT:-5174}:80"
    depends_on:
      - backend
      - onlyoffice

  localtunnel:
    profiles: ["tunnel"]
    image: node:20-alpine
    container_name: hrms-localtunnel
    network_mode: "service:frontend"
    depends_on:
      - frontend
    command: >
      sh -c "echo 'Waiting for frontend...' &&
             until wget -q -O /dev/null http://127.0.0.1:80; do sleep 2; done &&
             echo 'Starting localtunnel...' &&
             npx --yes localtunnel --port 80 --subdomain ${LOCALTUNNEL_SUBDOMAIN:-hrms-test-7q2k9m4x} 2>&1"
    restart: unless-stopped

volumes:
  postgres_test_data:
  orders_test_data:
  staffing_test_data:
  templates_test_data:
  personal_files_test_data:
