services:
  postgres:
    image: postgres:15-alpine
    container_name: hrms-postgres-test
    environment:
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: hrms_pass_test
      POSTGRES_DB: hrms_test
    ports:
      - "5433:5432"
    volumes:
      - ../data/postgres_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    container_name: hrms-backend-test
    volumes:
      - ../data/orders_test:/app/data/orders
      - ../data/templates_test:/app/data/templates
      - ../data/personal_files_test:/app/data/personal
    ports:
      - "8001:8000"
    env_file:
      - ../.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://hrms_user:hrms_pass_test@postgres:5432/hrms_test
      ENV: test
    depends_on:
      postgres:
        condition: service_healthy
