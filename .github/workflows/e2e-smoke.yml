# e2e-smoke — Playwright setup + smoke (workers 1)
#
# Stack in CI (no docker-compose monorepo):
#   - services: postgres:15
#   - backend: uvicorn app.main:app :8000 (DEV_BYPASS_AUTH, seeded admin)
#   - frontend: playwright webServer → npm run frontend :5173
#
# Status: full green on GHA is NOT yet verified in this repo.
# Prefer workflow_dispatch for intentional runs; PR path is best-effort
# (continue-on-error) so a flaky stack does not block merges.
name: e2e-smoke

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master, feat/e2e-rewrite]

concurrency:
  group: e2e-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Best-effort on PR until the stack is proven green on GHA.
    # workflow_dispatch / push still surface hard failures for debugging.
    continue-on-error: ${{ github.event_name == 'pull_request' }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hrms_user
          POSTGRES_PASSWORD: hrms_pass
          POSTGRES_DB: hrms_dev
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U hrms_user -d hrms_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Backend / alembic / create_user
      DATABASE_URL: postgresql+asyncpg://hrms_user:hrms_pass@localhost:5432/hrms_dev
      DEV_BYPASS_AUTH: "true"
      ENV: dev
      ONLYOFFICE_ENABLED: "false"
      SECRET_KEY: ci-e2e-secret-not-for-prod
      # Frontend (Vite reads VITE_* from process env; no .env.dev in CI)
      VITE_AUTH_MODE: dev
      # Playwright
      CI: "true"
      E2E_BASE_URL: http://localhost:5173
      E2E_API_URL: http://localhost:8000/api
      E2E_ADMIN_USERNAME: admin
      E2E_ADMIN_PASSWORD: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install root + frontend deps
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Alembic migrate
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          # Safe on empty DB (no alembic_version yet)
          python scripts/migrate_production_version.py
          python -m alembic upgrade head

      - name: Seed admin user
        working-directory: backend
        env:
          PYTHONPATH: .
        # password_hash is SSO placeholder; DEV_BYPASS_AUTH accepts password "dev"
        run: python scripts/create_user.py admin "CI Admin"

      - name: Start backend (uvicorn)
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/hrms-backend.log 2>&1 &
          echo $! > /tmp/hrms-backend.pid
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:8000/api/health >/dev/null; then
              echo "Backend healthy (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become healthy"
          cat /tmp/hrms-backend.log || true
          exit 1

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: e2e smoke (setup + smoke)
        # Frontend started by playwright.config webServer (npm run frontend :5173)
        run: npx playwright test --project=setup --project=smoke

      - name: Dump backend log on failure
        if: failure()
        run: |
          echo "===== /tmp/hrms-backend.log ====="
          cat /tmp/hrms-backend.log || true

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e-smoke
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
