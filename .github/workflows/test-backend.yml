name: test-backend

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hrms_user
          POSTGRES_PASSWORD: hrms_pass
          POSTGRES_DB: hrms_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U hrms_user -d hrms_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: pytest xdist
        env:
          HRMS_TEST_DATABASE_URL: postgresql+asyncpg://hrms_user:hrms_pass@localhost:5432/hrms_test
        run: python -m pytest -n auto --dist=loadfile -q
